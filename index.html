<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo blog</title>

    <!-- COLLEGAMENTI GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+TAS+Beginner:wght@400..700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sometype+Mono:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- COLLEGAMENTO CSS -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header class="header-container">
        <h1 class="title">ESTATE '24</h1>
    </header>
    <main class="wrapper">

        <!-- GALLERY -->
        <section id="photo-gallery"></section>

        <!-- OVERLAY -->
        <div class="img-overlay-container">
            <button class="btn-close-overlay">Chiudi</button>
            <img src="" alt="" class="img-overlay">
        </div>

    </main>
    <footer class="container-footer">
        <div id="add-photo">
            <form>
                <label for="upload-img">Aggiungi un'immagine:</label>
                <input type="file" id="upload-img" name="foto">
                <button type="submit" id="btn-form">Invia Foto</button>
            </form>
        </div>
    </footer>

    <!-- COLLEGAMENTI JAVASCRIPT -->
    <script src="./scripts/function.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
